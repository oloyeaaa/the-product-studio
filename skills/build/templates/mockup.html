<!doctype html>
<!-- Product Studio mockup template. A standalone 1600x1200 studio scene that
     presents the filled cover as a product shot: one large angled cover with a
     soft shadow, plus a smaller second copy behind it.
     HOW TO FILL:
       1. Copy this file to the product folder as mockup.html.
       2. Fill the token block from profile.brand (same values as cover.html).
       3. Paste the FILLED cover content (the markup inside the .cover-inner
          slots below: wordmark, eyebrow, title, subtitle) into BOTH cover
          blocks, marked SLOT A (front) and SLOT B (back). Same content twice.
       4. Screenshot: python render_pdf.py shot mockup.html mockup.png --size 1600x1200
     Self-contained and offline-safe: system font stack, no external requests,
     no iframes, no images. -->
<html lang="en"><head><meta charset="utf-8">
<title>[TITLE] mockup</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    /* @brand-tokens: fill from profile.brand */
    --base:#101216;      /* profile.brand.colors.base */
    --accent:#4C8DFF;    /* profile.brand.colors.accent */
    --ink:#F6F7F8;
    --mut:#9AA0A9;
    /* @end-brand-tokens */
    --disp:'Avenir Next','Segoe UI',system-ui,-apple-system,sans-serif;
  }
  html,body{ width:1600px; height:1200px; overflow:hidden; }
  body{ font-family:var(--disp);
    background:
      radial-gradient(1200px 800px at 30% 20%, #3E434C, transparent 70%),
      linear-gradient(160deg, #33373E 0%, #23262C 55%, #1A1C21 100%); }
  .scene{ width:1600px; height:1200px; position:relative;
    perspective:2200px; overflow:hidden; }
  .floor{ position:absolute; left:0; right:0; bottom:0; height:340px;
    background:linear-gradient(to bottom, transparent, rgba(0,0,0,.35)); }

  /* each .book is a scaled-down 3:4 cover (600x800) */
  .book{ width:600px; height:800px; position:absolute;
    background:
      radial-gradient(560px 360px at 85% -10%, rgba(255,255,255,.06), transparent 60%),
      var(--base);
    color:var(--ink); padding:56px 50px; display:flex; flex-direction:column;
    border-radius:6px; }
  .book.front{ left:520px; top:170px; z-index:2;
    transform:rotateY(-14deg) rotateZ(-1.5deg);
    box-shadow:-40px 60px 90px rgba(0,0,0,.55), -6px 10px 24px rgba(0,0,0,.35); }
  .book.back{ left:920px; top:250px; z-index:1;
    transform:rotateY(16deg) rotateZ(2deg) scale(.82); filter:brightness(.75);
    box-shadow:-30px 50px 70px rgba(0,0,0,.5); }
  .book::after{ content:""; position:absolute; top:0; bottom:0; left:0; width:14px;
    background:linear-gradient(to right, rgba(255,255,255,.10), transparent);
    border-radius:6px 0 0 6px; }

  /* cover slots, scaled to the 600x800 book */
  .wm{ font-weight:700; font-size:22px; letter-spacing:-.01em; }
  .wm i{ color:var(--accent); font-style:normal; }
  .mid{ margin-top:auto; margin-bottom:auto; }
  .eyebrow{ font-weight:800; font-size:13px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
  .title{ font-weight:800; font-size:58px; line-height:1.0;
    letter-spacing:-.025em; }
  .rule{ width:60px; height:5px; background:var(--accent);
    border-radius:3px; margin:26px 0 22px; }
  .subtitle{ font-weight:500; font-size:21px; line-height:1.3; color:var(--mut); }
  .foot{ font-weight:700; font-size:13px; color:var(--mut); }
</style></head><body>

<div class="scene">
  <div class="floor"></div>

  <!-- SLOT B: back copy (same filled content as SLOT A) -->
  <div class="book back">
    <div class="wm">[WORDMARK]</div>
    <div class="mid">
      <div class="eyebrow">[EYEBROW: the format]</div>
      <div class="title">[TITLE]</div>
      <div class="rule"></div>
      <div class="subtitle">[SUBTITLE: the one-line outcome promise.]</div>
    </div>
    <div class="foot">by [WORDMARK]</div>
  </div>

  <!-- SLOT A: front copy (the hero) -->
  <div class="book front">
    <div class="wm">[WORDMARK]</div>
    <div class="mid">
      <div class="eyebrow">[EYEBROW: the format]</div>
      <div class="title">[TITLE]</div>
      <div class="rule"></div>
      <div class="subtitle">[SUBTITLE: the one-line outcome promise.]</div>
    </div>
    <div class="foot">by [WORDMARK]</div>
  </div>
</div>

</body></html>
